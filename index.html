<!DOCTYPE html>
<html>
<head>
    <title>55 Club Game</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; }
        .buttons { margin-top: 20px; }
        button { padding: 15px 30px; margin: 10px; font-size: 16px; cursor: pointer; border: none; color: white; border-radius: 5px; }
        .green { background-color: green; }
        .red { background-color: red; }
        .violet { background-color: purple; }
    </style>
</head>
<body>
    <h1>55 Club Game</h1>
    <p>अपना रंग चुनें:</p>
    <div class="buttons">
        <button class="green" onclick="alert('Green चुना!')">Green</button>
        <button class="violet" onclick="alert('Violet चुना!')">Violet</button>
        <button class="red" onclick="alert('Red चुना!')">Red</button>
    </div>
</body>
</html>
