<!DOCTYPE html>
<html>
<head>
    <title>Aviator Game</title>
    <style>
        body { text-align: center; font-family: Arial; padding-top: 50px; }
        #multiplier { font-size: 60px; color: #ff4500; }
        button { padding: 20px 40px; font-size: 20px; background-color: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Aviator Demo</h2>
    <h1 id="multiplier">1.00x</h1>
    <button onclick="stopGame()">Cash Out</button>

    <script>
        let mult = 1.00;
        const multDisplay = document.getElementById('multiplier');
        
        const gameInterval = setInterval(() => {
            mult += 0.01;
            multDisplay.innerText = mult.toFixed(2) + "x";
        }, 100);

        function stopGame() {
            alert("बधाई हो! आपने " + mult.toFixed(2) + "x पर कैश आउट किया!");
            clearInterval(gameInterval);
        }
    </script>
</body>
</html>
